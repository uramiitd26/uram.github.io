<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URAM-IITD | Collaborations</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --surface: rgba(255,255,255,0.9);
      --surface-strong: rgba(255,255,255,0.95);
      --ink:#162126;
      --muted:#5a6a70;
      --accent:#0e646d;
      --accent-deep:#0a4750;
      --shadow:0 20px 60px rgba(0,0,0,0.1);
    }

    body {
      margin:0;
      font-family:"Manrope",sans-serif;
      background:#f5f2ea;
      color:var(--ink);
    }

    .container {
      width:min(1100px,90%);
      margin:auto;
      padding:20px 0;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    

    /* MOBILE MENU */
    .menu-toggle {
      display:none;
      flex-direction:column;
      gap:4px;
      background:none;
      border:none;
      cursor:pointer;
    }

    .menu-toggle span {
      width:22px;
      height:2px;
      background:var(--ink);
      display:block;
    }

    @media(max-width:768px){
      .menu-toggle{
        display:flex;
      }

      .nav{
        position:absolute;
        top:70px;
        right:20px;
        background:var(--surface-strong);
        flex-direction:column;
        padding:14px;
        border-radius:16px;
        box-shadow:var(--shadow);
        display:none;
      }

      .nav.show{
        display:flex;
      }
    }

    /* ===== ORIGINAL BOX (UNCHANGED LOOK) ===== */

    .content-center {
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .box {
      background:white;
      padding:40px 60px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-family:"Playfair Display",serif;
      font-size:2.5rem;
      margin:0;
    }

    @media(max-width:768px){
      .box {
        padding:30px;
      }
      h1 {
        font-size:2rem;
      }
    }
  </style>
</head>

<body>
<div id="header-placeholder"></div>
<div class="container">


  <!-- CENTER CONTENT -->
  <div class="content-center">
    <div class="box">
      <h1>Updating soon</h1>
    </div>
  </div>

</div>

<script src="components.js"></script>

</body>
</html>
