<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URAM-IITD | Collaborations</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>

  <style>
    body {
      margin:0;
      font-family:"Manrope",sans-serif;
      background:#f5f2ea;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      color:#162126;
    }

    .box {
      background:white;
      padding:40px 60px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-family:"Playfair Display",serif;
      font-size:2.5rem;
      margin:0;
    }

    @media(max-width:768px){
      .box {
        padding:30px;
      }
      h1 {
        font-size:2rem;
      }
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Updating soon</h1>
  </div>
</body>
</html>
