<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URAM-IITD | Contact</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --surface: rgba(255,255,255,0.9);
      --ink:#162126;
      --muted:#5a6a70;
      --accent:#0e646d;
      --radius:24px;
    }

    body {
      margin:0;
      font-family:"Manrope",sans-serif;
      background:#f5f2ea;
      color:var(--ink);
    }

    .container {
      width:min(1100px,90%);
      margin:auto;
      padding:20px 0;
    }

    header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:var(--surface);
      padding:12px 18px;
      border-radius:20px;
      margin-bottom:20px;
    }

    .nav {
      display:flex;
      gap:10px;
      overflow-x:auto;
    }

    .nav a {
      text-decoration:none;
      color:var(--muted);
      padding:8px 12px;
      border-radius:999px;
    }

    .nav a.active,
    .nav a:hover {
      background:#e0f2f3;
      color:var(--accent);
    }

    h1 {
      font-family:"Playfair Display",serif;
      font-size:2.5rem;
      margin-bottom:20px;
    }

    .section {
      background:var(--surface);
      padding:30px;
      border-radius:var(--radius);
      margin-bottom:20px;
    }

    .contact-text {
      line-height:1.8;
      color:var(--muted);
      font-size:1.05rem;
    }

    .contact-text strong {
      color:var(--ink);
    }

    .map-container {
      margin-top:20px;
      border-radius:16px;
      overflow:hidden;
    }

    iframe {
      width:100%;
      height:350px;
      border:0;
    }

    /* 📱 Responsive */
    @media(max-width:768px){
      h1{
        font-size:2rem;
      }

      iframe {
        height:280px;
      }
    }
  </style>
</head>

<body>
<div class="container">

<header>
  <strong>URAM-IITD</strong>
  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="projects.html">Projects</a>
    <a href="members.html">Members</a>
    <a href="collaborations.html">Collaborations</a>
    <a href="current-openings.html">Current Openings</a>
    <a class="active" href="contact.html">Contact</a>
  </nav>
</header>

<section class="section">
  <h1>Contact</h1>

  <p class="contact-text">
    <strong>Prof. Sri Harsha Kota</strong><br><br>

    Department of Civil Engineering (Block V, Room 201)<br>
    Indian Institute of Technology Delhi, New Delhi 110016 (India)<br><br>

    Phone: +91-11-2659-1208<br>
    Fax: (+91)-11-2658-1117<br><br>

    Email: harshakota@iitd.ac.in
  </p>

  <!-- Google Map -->
  <div class="map-container">
    <iframe 
      src="https://www.google.com/maps?q=IIT%20Delhi&output=embed"
      loading="lazy">
    </iframe>
  </div>

</section>

</div>
</body>
</html>
