<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URAM-IITD | Current Openings</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --surface: rgba(255,255,255,0.9);
      --surface-strong: rgba(255,255,255,0.95);
      --ink:#162126;
      --muted:#5a6a70;
      --accent:#0e646d;
      --accent-deep:#0a4750;
      --radius:24px;
      --shadow:0 20px 60px rgba(0,0,0,0.1);
    }

    body {
      margin:0;
      font-family:"Manrope",sans-serif;
      background:#f5f2ea;
      color:var(--ink);
    }

    .container {
      width:min(1000px,90%);
      margin:auto;
      padding:20px 0;
    }

    /* ===== ORIGINAL CONTENT (UNCHANGED) ===== */

    h1 {
      font-family:"Playfair Display",serif;
      font-size:2.5rem;
      margin-bottom:16px;
    }

    .section {
      background:var(--surface);
      padding:30px;
      border-radius:var(--radius);
    }

    .content-text {
      font-size:1.05rem;
      line-height:1.8;
      color:var(--muted);
    }

    .email {
      margin-top:20px;
      font-weight:600;
      color:var(--accent);
      word-break: break-all;
    }
  </style>
</head>

<body>
  <div id="header-placeholder"></div>
<div class="container">



<section class="section">
  <h1>Current Openings</h1>

  <p class="content-text">

  </p>

  <p class="email">

  </p>

</body>
</html>
