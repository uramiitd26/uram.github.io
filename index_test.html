<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URAM-IITD | Contact</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --surface: rgba(255,255,255,0.9);
      --surface-strong: rgba(255,255,255,0.95);
      --ink:#162126;
      --muted:#5a6a70;
      --accent:#0e646d;
      --accent-deep:#0a4750;
      --radius:24px;
      --shadow:0 20px 60px rgba(0,0,0,0.1);
    }

    body {
      margin:0;
      font-family:"Manrope",sans-serif;
      background:#f5f2ea;
      color:var(--ink);
    }

    .container {
      width:min(1100px,90%);
      margin:auto;
      padding:20px 0;
    }

   

    

    /* MOBILE MENU */
    .menu-toggle {
      display:none;
      flex-direction:column;
      gap:4px;
      background:none;
      border:none;
      cursor:pointer;
    }

    .menu-toggle span {
      width:22px;
      height:2px;
      background:var(--ink);
      display:block;
    }

    @media(max-width:768px){
      .menu-toggle{
        display:flex;
      }

      .nav{
        position:absolute;
        top:70px;
        right:20px;
        background:var(--surface-strong);
        flex-direction:column;
        padding:14px;
        border-radius:16px;
        box-shadow:var(--shadow);
        display:none;
      }

      .nav.show{
        display:flex;
      }

      h1{
        font-size:2rem;
      }

      iframe {
        height:280px;
      }
    }

    /* ===== ORIGINAL CONTENT (UNCHANGED) ===== */

    h1 {
      font-family:"Playfair Display",serif;
      font-size:2.5rem;
      margin-bottom:20px;
    }

    .section {
      background:var(--surface);
      padding:30px;
      border-radius:var(--radius);
      margin-bottom:20px;
    }

    .contact-text {
      line-height:1.8;
      color:var(--muted);
      font-size:1.05rem;
    }

    .contact-text strong {
      color:var(--ink);
    }

    .map-container {
      margin-top:20px;
      border-radius:16px;
      overflow:hidden;
    }

    iframe {
      width:100%;
      height:350px;
      border:0;
    }
  </style>
</head>

<body>
<div id="header-placeholder"></div>
<div class="container">


<section class="section">
  <h1>Contact</h1>

  <p class="contact-text">
    <strong>Prof. Sri Harsha Kota</strong><br><br>

    Department of Civil & Environmental Engineering (Block V, Room 201)<br>
    Indian Institute of Technology Delhi, New Delhi 110016 (India)<br><br>

    Phone: +91-11-2659-1208<br>
    Fax: (+91)-11-2658-1117<br><br>

    Email: harshakota@iitd.ac.in
  </p>

  <!-- Google Map -->
  <div class="map-container">
    <iframe 
      src=src="https://www.google.com/maps?q=G5WR%2BFFF%2C+IIT+Delhi%2C+Jia+Sarai%2C+New+Delhi%2C+Delhi+110016&output=embed"
      loading="lazy">
    </iframe>
  </div>

</section>

</div>

<script src="components.js"></script>

</body>
</html>
